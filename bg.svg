  <rect width="1600" height="800" fill="url(#grad)" />
  
  <text x="800" y="240" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="64" font-weight="600" fill="#ffffff" opacity="0.95" text-anchor="middle" letter-spacing="3">Drag to Install</text>
  
  <g transform="translate(600, 340)" filter="url(#glow)">
    <path d="M0,45 L260,45 L260,0 L400,60 L260,120 L260,75 L0,75 Z" fill="#3a80df" opacity="0.85" />
    <path d="M0,45 L260,45 L260,0 L400,60 L260,120 L260,75 L0,75 Z" fill="none" stroke="#6ca6ff" stroke-width="4" opacity="0.9" />
